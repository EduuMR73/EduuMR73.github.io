<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fondo carbón -->
  <rect width="32" height="32" rx="4" fill="#1E1E1E"/>

  <!-- Letra E: trazo vertical izquierdo + 3 barras horizontales -->
  <rect x="2"  y="5"  width="2.5" height="22" fill="#E8C96D"/>
  <rect x="2"  y="5"  width="10"  height="2.5" fill="#E8C96D"/>
  <rect x="2"  y="14" width="7.5" height="2.5" fill="#E8C96D"/>
  <rect x="2"  y="24.5" width="10" height="2.5" fill="#E8C96D"/>

  <!-- Letra M: dos trazos verticales + dos brazos superiores + dos descensos internos -->
  <rect x="14.5" y="5"   width="2.5" height="22" fill="#E8C96D"/>
  <rect x="27"   y="5"   width="2.5" height="22" fill="#E8C96D"/>
  <rect x="17"   y="5"   width="3.5" height="2.5" fill="#E8C96D"/>
  <rect x="17"   y="7.5" width="2.5" height="7"   fill="#E8C96D"/>
  <rect x="23.5" y="5"   width="3.5" height="2.5" fill="#E8C96D"/>
  <rect x="23.5" y="7.5" width="2.5" height="7"   fill="#E8C96D"/>
</svg>
